# Greenfield compose stub — customize image names, env, and paths per PROJECT/AGENTS.MD
# Startup: db healthy → migrate → api healthy → web

services:
  db:
    image: ${PROJECT_SLUG:-todo-app}-db:latest
    build:
      context: ../platforms/db
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  migrate:
    image: ${PROJECT_SLUG:-todo-app}-api:latest
    build:
      context: ../platforms/api
      dockerfile: docker/Dockerfile
    env_file:
      - ../platforms/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-app_db}
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: ${PROJECT_SLUG:-todo-app}-api:latest
    build:
      context: ../platforms/api
      dockerfile: docker/Dockerfile
    env_file:
      - ../platforms/api/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-app_db}
      PORT: "3001"
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    image: ${PROJECT_SLUG:-todo-app}-web:latest
    build:
      context: ../platforms/web
      dockerfile: docker/Dockerfile
    env_file:
      - ../platforms/web/.env
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
